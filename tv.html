<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Polimer TV - Live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000
        }

        #msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 28px;
            text-align: center;
            z-index: 10
        }

        #bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 24px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, .8), transparent);
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: opacity .3s
        }

        #bar:hover,
        #bar.show {
            opacity: 1
        }

        #dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e53935;
            animation: pulse 2s infinite
        }

        #title {
            color: #fff;
            font-size: 20px;
            font-weight: bold
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }
    </style>
</head>

<body>
    <div id="bar" class="show"><span id="dot"></span><span id="title">Polimer TV — Live</span></div>
    <div id="msg">Loading Polimer TV...</div>
    <video id="v" autoplay playsinline muted></video>
    <script>
        // Polimer TV stream — use the working HLS feed from the channel list
        var STREAM = 'https://cdn-2.pishow.tv/live/1241/master.m3u8';
        var v = document.getElementById('v');
        var msg = document.getElementById('msg');
        var bar = document.getElementById('bar');
        var started = false;
        var retryTimer = null;
        var retryCount = 0;

        function hideMsg() { msg.style.display = 'none'; }
        function showError(t) { msg.style.display = 'block'; msg.textContent = t || 'Stream unavailable. Retrying...'; }
        function clearRetry() {
            if (retryTimer) {
                clearTimeout(retryTimer);
                retryTimer = null;
            }
        }
        function scheduleRetry(resetSource) {
            clearRetry();
            retryCount += 1;
            var delay = Math.min(15000, 2000 + (retryCount * 1000));
            retryTimer = setTimeout(function () {
                if (resetSource) {
                    v.src = STREAM;
                    v.load();
                }
                v.play().catch(function () { });
            }, delay);
        }
        function markReady() {
            hideMsg();
            started = true;
            retryCount = 0;
            v.play().catch(function () { });
        }

        // Try native HLS first (Smart TVs, Safari, iOS)
        if (v.canPlayType('application/vnd.apple.mpegurl') || v.canPlayType('application/x-mpegURL')) {
            v.src = STREAM;
            v.addEventListener('loadedmetadata', function () {
                markReady();
            });
            v.addEventListener('canplay', function () {
                if (!started) markReady();
            });
            v.addEventListener('error', function () {
                showError('Stream failed. Retrying...');
                scheduleRetry(true);
            });
        } else {
            // Load HLS.js for browsers that don't support native HLS
            var s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js';
            s.onload = function () {
                if (!Hls.isSupported()) { showError('This browser cannot play live streams.'); return; }
                var hls = new Hls({ maxBufferLength: 10, maxMaxBufferLength: 30, enableWorker: false });
                hls.loadSource(STREAM);
                hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    markReady();
                });
                hls.on(Hls.Events.ERROR, function (_, data) {
                    if (data.fatal) {
                        showError('Stream error. Retrying...');
                        scheduleRetry(false);
                        hls.destroy();
                    }
                });
            };
            document.head.appendChild(s);
        }

        // Auto-retry if stalled
        v.addEventListener('stalled', function () {
            showError('Stream stalled. Recovering...');
            scheduleRetry(true);
        });
        v.addEventListener('waiting', function () {
            if (started) msg.style.display = 'none';
        });

        // Hide top bar after 4 seconds
        setTimeout(function () { bar.classList.remove('show'); }, 4000);

        // Keep autoplay muted; let the viewer unmute manually if their device requires it.
        document.addEventListener('click', function () { v.play().catch(function () { }); }, { once: true });
        document.addEventListener('keydown', function () { v.play().catch(function () { }); }, { once: true });
    </script>
</body>

</html>
